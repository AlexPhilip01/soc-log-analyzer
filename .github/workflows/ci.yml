name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=soc_analyzer --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/

  integration:
    name: Integration (sample logs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .

      - name: Analyze SSH sample
        run: soc-analyzer data/sample_logs/auth.log --no-color || true

      - name: Analyze Apache sample
        run: soc-analyzer data/sample_logs/apache_access.log --no-color || true

      - name: Analyze Windows sample
        run: soc-analyzer data/sample_logs/windows_events.log --no-color || true

      - name: JSON output
        run: soc-analyzer data/sample_logs/auth.log -f json -o /tmp/report.json && cat /tmp/report.json | python3 -m json.tool > /dev/null

      - name: CSV output
        run: soc-analyzer data/sample_logs/auth.log -f csv

      - name: Markdown output
        run: soc-analyzer data/sample_logs/auth.log -f markdown
