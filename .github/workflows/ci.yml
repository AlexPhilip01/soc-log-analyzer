name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=soc_analyzer --cov-report=term-missing

      - name: Smoke test SSH
        run: soc-analyzer data/sample_logs/auth.log --no-color || true

      - name: Smoke test Apache
        run: soc-analyzer data/sample_logs/apache_access.log --no-color || true

      - name: Smoke test Windows
        run: soc-analyzer data/sample_logs/windows_events.csv --no-color || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/ --ignore E501 || true
